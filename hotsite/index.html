<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotsite - Lançamento Exclusivo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="hotsite-container">
        <!-- Coluna de Informação (Esquerda) -->
        <section class="hotsite-info">
            <img src="src/icone1.png" class="Hackathon" alt="ícone do hacka">
            <h1>Hackathon 2026</h1>
            <h2>Regras</h2>
            <p>O pitch é de até 3 minutos!</p>
            <p style ="margin-bottom: 20px;">É estritamente proíbido o uso de IA na competição!</p>
            <h2>Premiações</h2>
            <p>Medalha de 1º, 2º, e 3º lugar</p>
            <p>para os melhores projetos</p>
            <p style="margin-bottom: 20px;">Medalha de participação para os demais</p>
            <h2>Data</h2>
            <p>13/07/2026 até 17/07/2026</p>

        </section>
        <!-- Coluna do Formulário (Direita) -->
        <section class="hotsite-form-wrapper">
            <form action="#" method="POST" class="cadastro-form">
                <fieldset>
                    <legend>Garanta sua vaga</legend>
                    <div class="input-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
                    </div>
                    <div class="input-group">
                        <label for="email">E-mail Profissional</label>
                        <input type="email" id="email" name="email" required placeholder="seu@email.com">
                    </div>
                    <div class="input-group">
                        <label for="github">Username Github</label>
                        <input type="text" id="GithubName" name="GithubName" placeholder="Seu Username">
                    </div>
                    <div class="input-group">
                        <label for="Área">Área de atuação</label>
                        <input type="text" id="area" name="area" placeholder="Sua área de atuação">
                    </div>
                    <button type="submit" class="btn-submit">Quero meu acesso</button>
                </fieldset>
            </form>
        </section>
    </main>
</body>

</html>
