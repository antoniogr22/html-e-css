<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotsite - Lançamento Exclusivo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="hotsite-container">
        <!-- Coluna de Informação (Esquerda) -->
        <section class="hotsite-info">

            <h1>Participe do nosso Lançamento</h1>
            <p>Cadastre-se agora para receber acesso antecipado, descontos exclusivos e
                materiais gratuitos direto na sua caixa de entrada.</p>
        </section>

        <!-- Coluna do Formulário (Direita) -->
        <section class="hotsite-form-wrapper">
            <form action="#" method="POST" class="cadastro-form">
                <fieldset>
                    <legend>Garanta sua vaga</legend>

                    <div class="input-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" required placeholder="Digite seu 
nome">
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail Profissional</label>
                        <input type="email" id="email" name="email" required placeholder="seu@email.com">
                    </div>

                    <div class="input-group">
                        <label for="github">Link do github</label>
                        <input type="text" id="link" name="link" placeholder="seu link">
                    </div>

                    <div class="input-group">
                        <label for="Area">Área de atuação</label>
                        <input type="text" id="area" name="area" placeholder="area">
                    </div>
                    <button type="submit" class="btn-submit">Quero meu acesso</button>
                </fieldset>
            </form>
        </section>
    </main>

</body>

</html>
